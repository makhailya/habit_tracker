name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, homework/docker-cicd ]
  pull_request:
    branches: [ main, develop, homework/docker-cicd ]

env:
  PYTHON_VERSION: '3.13'

jobs:
  # Тесты оставляем на ubuntu-latest (в облаке GitHub),
  # чтобы не нагружать ваш сервер лишними базами данных.
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file for tests
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DEBUG=False" >> .env
          echo "DB_NAME=test_db" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/0" >> .env
      - name: Run migrations
        run: |
          python manage.py migrate users
          python manage.py migrate
      - name: Run tests
        run: |
          python manage.py test
      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test
          coverage report
          coverage xml
      - name: Check code style with flake8
        run: |
          flake8 --exclude=*/migrations/*,venv,env --max-line-length=119
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # --- ОБНОВЛЕННЫЙ ДЕПЛОЙ ---
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted  # <--- Запускаем прямо на вашем сервере
    needs: test           # Деплоим только если тесты прошли
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4 # Раннер сам скачает код в свою рабочую папку

      - name: 🔄 Sync files to project directory
        run: |
          # Создаем папку, если её нет
          mkdir -p /home/makhailya/projects/habit_tracker/
          
          # Синхронизируем файлы
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='venv' \
            --exclude='.env' \
            ./ /home/makhailya/projects/habit_tracker/

      - name: 🚀 Run migrations and Restart services
        run: |
          cd /home/makhailya/projects/habit_tracker
          
          # Активируем окружение и обновляем зависимости (если нужно)
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Миграции и статика
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          
          # Перезапуск сервисов через sudo
          # (Убедитесь, что у пользователя makhailya есть права на sudo без пароля для systemctl)
          sudo systemctl restart habit_tracker
          sudo systemctl restart habit_tracker_celery
          sudo systemctl restart habit_tracker_beat
          
          echo "🎉 Deployed successfully on self-hosted runner!"
