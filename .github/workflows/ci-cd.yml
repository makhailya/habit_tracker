name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, homework/docker-cicd ]
  pull_request:
    branches: [ main, develop, homework/docker-cicd ]

env:
  PYTHON_VERSION: '3.13'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DEBUG=False" >> .env
          echo "DB_NAME=test_db" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/0" >> .env
      - name: Run migrations
        run: |
          python manage.py migrate users
          python manage.py migrate
      - name: Run tests
        run: |
          python manage.py test
      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test
          coverage report
          coverage xml
      - name: Check code style with flake8
        run: |
          flake8 --exclude=*/migrations/*,venv,env --max-line-length=119
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
  # Проверка Docker сборки
  docker-build:
    name: Check Docker Build
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔨 Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: habit-tracker:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: ✅ Docker build successful
      run: echo "✅ Docker image built successfully!"

  # Деплой через Docker Compose
  deploy:
    name: Deploy to Server via Docker
    needs: [test, docker-build]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/homework/docker-cicd'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔑 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy via SSH
      run: |
        ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
          cd ${{ secrets.PROJECT_PATH }}
          
          echo "📦 Pulling latest changes..."
          git pull origin ${{ github.ref_name }}
          
          echo "🐳 Building and starting containers..."
          docker-compose up -d --build
          
          echo "✅ Checking container status..."
          docker-compose ps
          
          echo "🧹 Cleaning up old images..."
          docker image prune -af
          
          echo "✅ Deployment completed successfully!"
        EOF

    - name: 🧹 Cleanup
      if: always()
      run: rm -f ~/.ssh/deploy_key

    - name: ✅ Notify success
      if: success()
      run: echo "🎉 Application deployed successfully to http://${{ secrets.SERVER_HOST }}"

    - name: ❌ Notify failure
      if: failure()
      run: |
        echo "❌ Deployment failed!"
        exit 1
