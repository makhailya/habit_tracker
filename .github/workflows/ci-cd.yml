name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, homework/docker-cicd ]
  pull_request:
    branches: [ main, develop, homework/docker-cicd ]

env:
  PYTHON_VERSION: '3.13'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Create .env file
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "DEBUG=False" >> .env
          echo "DB_NAME=test_db" >> .env
          echo "DB_USER=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/0" >> .env
      - name: Run migrations
        run: |
          python manage.py migrate users
          python manage.py migrate
      - name: Run tests
        run: |
          python manage.py test
      - name: Run tests with coverage
        run: |
          coverage run --source='.' manage.py test
          coverage report
          coverage xml
      - name: Check code style with flake8
        run: |
          flake8 --exclude=*/migrations/*,venv,env --max-line-length=119
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Деплой через Docker Compose
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📦 Install dependencies
        run: |
          /home/makhailya/projects/habit_tracker/venv/bin/pip install -r $GITHUB_WORKSPACE/requirements.txt --quiet

      - name: 🗃️ Run migrations
        run: |
          /home/makhailya/projects/habit_tracker/venv/bin/python $GITHUB_WORKSPACE/manage.py migrate --noinput

      - name: 📂 Collect static files
        run: |
          /home/makhailya/projects/habit_tracker/venv/bin/python $GITHUB_WORKSPACE/manage.py collectstatic --noinput

      - name: 🔄 Sync project files
        run: |
          rsync -av --exclude='.git' --exclude='venv' --exclude='.env' \
            $GITHUB_WORKSPACE/ \
            /home/makhailya/projects/habit_tracker/

      - name: 🔄 Restart services
        run: |
          sudo systemctl restart habit_tracker
          sudo systemctl restart habit_tracker_celery
          sudo systemctl restart habit_tracker_beat

      - name: ✅ Check services
        run: |
          sudo systemctl is-active habit_tracker
          sudo systemctl is-active habit_tracker_celery
          sudo systemctl is-active habit_tracker_beat
          echo "🎉 Deployed successfully!"